name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: srv1105540.hstgr.cloud
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 180s
          command_timeout: 600s
          script: |
            set -e
            cd /home/root/stock-research-platform
            git pull origin main
            cd /root
            docker compose up -d --build stock-app
            docker image prune -f --filter "until=24h"
            # Health check via docker exec
            for i in $(seq 1 30); do
              docker exec stock-app wget -qO- http://localhost:3000/api/health && exit 0
              sleep 2
            done
            echo "Health check failed after 60s"
            exit 1
